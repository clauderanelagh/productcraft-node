name: Release

# On every push to main:
#   1. Look at .changeset/*.md files for pending bumps.
#   2. If any exist, open / update the "Version Packages" PR that
#      bumps versions + updates CHANGELOG.md per package.
#   3. If no pending changesets and versions in package.json files
#      don't yet exist on npm, publish those packages via Trusted
#      Publishing (OIDC — no NPM_TOKEN secret required; see
#      packages/*/package.json#publishConfig).
#
# One-time setup per package on npmjs.com:
#   Package settings → Trusted publishers →
#   GitHub Actions, clauderanelagh/productcraft-node, release.yml.

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      # npm CLI 11.5.1+ is required for Trusted Publishing (OIDC). Node 22
      # ships with npm 10.x by default, which doesn't speak the
      # `npm publish` OIDC exchange — without this step, publishes 404
      # even with a correct trusted-publisher config on npmjs.com.
      # Pinned to 11.x: `npm@latest` (12.0.0, 2026-07) ends up missing
      # the `sigstore` module after the in-place upgrade and every
      # provenance publish dies with MODULE_NOT_FOUND (run 2026-07-09).
      - run: npm install -g npm@11
      - run: npm --version

      - run: pnpm install --frozen-lockfile
      - run: pnpm run codegen
      - run: pnpm run build
      - run: pnpm run test

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          # `release` script builds packages then runs `changeset
          # publish`, which inspects each workspace package version
          # against the npm registry and publishes new ones.
          publish: pnpm run release
          version: pnpm run version-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — npm CLI picks up the OIDC token from
          # `id-token: write` and exchanges it via Trusted Publishing.
          NPM_CONFIG_PROVENANCE: "true"
