name: Refresh OpenAPI specs

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Fetch latest specs
        run: bash scripts/refresh-specs.sh

      - name: Regenerate types
        run: |
          pnpm install --frozen-lockfile
          pnpm run codegen

      - name: Generate per-surface changesets for changed specs
        id: gen
        run: |
          set -euo pipefail
          changed=()
          for spec in Specs/*.json; do
            surface="$(basename "$spec" .json)"
            if ! git diff --quiet -- "$spec"; then
              echo "â€ş spec changed: $surface"
              changed+=("$surface")
              cat > ".changeset/auto-spec-refresh-${surface}-${GITHUB_RUN_ID}.md" <<MD
          ---
          "@productcraft/${surface}": patch
          ---

          Refresh ${surface} OpenAPI types from production.
          MD
            fi
          done
          if (( ${#changed[@]} == 0 )); then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "surfaces=${changed[*]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR
        if: steps.gen.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(specs): refresh from production"
          title: "chore(specs): nightly refresh â€” ${{ steps.gen.outputs.surfaces }}"
          body: |
            Auto-generated PR from `.github/workflows/spec-refresh.yml`.

            Surfaces with spec changes this run: **${{ steps.gen.outputs.surfaces }}**

            A per-surface changeset entry was added under `.changeset/` â€”
            merging this PR will trigger the release workflow, which opens
            a "Version Packages" PR bumping only the affected packages.
            The `productcraft` umbrella picks up a patch via
            `updateInternalDependencies` in `.changeset/config.json`.

            Specs refreshed from:
            - `https://api.auth.productcraft.co/docs-json`
            - `https://api.heimdall.productcraft.co/docs-json`
            - `https://api.mail.productcraft.co/docs-json`
            - `https://agora.productcraft.co/docs-json`
            - `https://api.rally.productcraft.co/docs-json`
          branch: chore/refresh-specs
          delete-branch: true
